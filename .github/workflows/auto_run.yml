name: 自动同步河南优选IP

on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 检查当前仓库代码
      uses: actions/checkout@v3

    - name: 设置高效 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装运行依赖
      run: pip install requests

    - name: 运行河南电信联通高级过滤脚本
      run: python get_ip.py

    - name: 自动将新生成的优选文本推送到仓库
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add joehncfip.txt
        git commit -m "自动更新河南联通电信优选IP" || exit 0
        git push
